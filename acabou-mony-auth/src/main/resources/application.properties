server.port=8081
spring.application.name=acabou-mony-auth
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_acabou_mony?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:solutis}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Força o Hibernate a saber que é MySQL caso ele se perca
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

