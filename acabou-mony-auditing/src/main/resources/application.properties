spring.application.name=acabou-mony-auditing
server.port=8084

# Parâmetros de Conexão com o Banco db_acabou_mony
spring.datasource.url=jdbc:mysql://localhost:3306/db_acabou_mony?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:solutis}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Validação do JPA e log de queries estruturadas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
