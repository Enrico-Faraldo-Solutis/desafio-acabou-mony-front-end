spring.application.name=acabou-mony-transaction
server.port=8083

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/db_acabou_mony
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:solutis}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Account Service URL
account.service.url=http://localhost:8080

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.accountService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.accountService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.accountService.failureRateThreshold=30
resilience4j.circuitbreaker.instances.accountService.slowCallRateThreshold=100
resilience4j.circuitbreaker.instances.accountService.slowCallDurationThreshold=2000
resilience4j.circuitbreaker.instances.accountService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.accountService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.accountService.waitDurationInOpenState=30000
resilience4j.circuitbreaker.instances.accountService.recordExceptions=org.springframework.web.client.RestClientException

# Resilience4j Retry Configuration
# Retry on transient failures: RestClientException, TimeoutException
# Exponential backoff: 100ms initial, 2x multiplier, max 4 attempts
# Max total retry time: ~1.5 seconds (100 + 200 + 400 + 800 = 1500ms)
resilience4j.retry.instances.accountService.maxAttempts=4
resilience4j.retry.instances.accountService.waitDuration=100
resilience4j.retry.instances.accountService.intervalFunction=exponential
resilience4j.retry.instances.accountService.exponentialBackoffMultiplier=2.0
resilience4j.retry.instances.accountService.retryExceptions=org.springframework.web.client.RestClientException,java.util.concurrent.TimeoutException
resilience4j.retry.instances.accountService.ignoreExceptions=java.lang.IllegalArgumentException

# Spring Cloud Sleuth Configuration
spring.sleuth.enabled=true
spring.sleuth.sampler.probability=1.0
logging.level.org.springframework.cloud.sleuth=DEBUG

# Actuator Configuration - Expose metrics and health endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Performance monitoring - Track transaction processing time
management.metrics.tags.application=acabou-mony-transaction
management.metrics.tags.environment=development

